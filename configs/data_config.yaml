# Data Configuration for Vi-VQA
# Dataset source: MinhQuy24/vlsp2023-vqa-dataset (HuggingFace Hub)

# HuggingFace Dataset Settings
huggingface:
  repo_id: "MinhQuy24/vlsp2023-vqa-dataset"
  cache_dir: "./data/cache"
  streaming: false
  use_auth_token: true

# Local data paths (if downloaded locally)
local:
  train_images: "./data/raw/train"
  dev_images: "./data/raw/dev"
  test_images: "./data/raw/test"
  
  train_json: "./data/raw/vlsp2023_train_data.json"
  dev_json: "./data/raw/vlsp2023_dev_data.json"
  test_json: "./data/raw/vlsp2023_test_data.json"

# Data splits
splits:
  train: 0.8
  eval: 0.1
  test: 0.1

# Data processing
processing:
  max_samples: null  # Set to int to limit samples (e.g., 1000)
  shuffle: true
  shuffle_seed: 42
  
# VQA specific
vqa:
  max_question_length: 512
  max_answer_length: 100
  tokenizer_max_length: 1024
  
# Image handling
image:
  keep_aspect_ratio: true
  # Image size will be determined by vision processor (256*28*28 to 512*512)
  
# Data loading
dataloader:
  num_workers: 4
  batch_size: 32
  pin_memory: true
  persistent_workers: false

