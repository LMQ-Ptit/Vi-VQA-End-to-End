# Student Model Configuration (for Knowledge Distillation)

model:
  name: "Qwen/Qwen2-VL-2B-Instruct"
  load_in_4bit: true

lora:
  r: 16
  lora_alpha: 16
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  lora_dropout: 0.0

training:
  batch_size: 2
  num_epochs: 1
  learning_rate: 2e-5
  max_length: 512
  output_dir: "outputs-distill"

distillation:
  temperature: 1.0
  alpha: 0.5

teacher:
  path: "models/teacher"
  max_new_tokens: 48

data:
  train_path: "data/vlsp2023_train_data.json"
  train_images: "data/training-images"